# ========================================
# DOCKER COMPOSE - Pill Recognition App
# ========================================
# File này định nghĩa cách chạy nhiều containers cùng lúc
# Giống như "chỉ huy" điều phối các "chiến sĩ" (containers)

# ========================================
# PHẦN 1: ĐỊNH NGHĨA CÁC SERVICES
# ========================================
# Mỗi service = 1 container = 1 phần của ứng dụng

services:

  # ========================================
  # SERVICE 1: API (FastAPI Backend)
  # ========================================
  # Nhiệm vụ: Xử lý nhận diện viên thuốc
  # Công nghệ: FastAPI + PyTorch + scikit-learn
  api:
    # ----------------------------------------
    # Build: Hướng dẫn Docker build image
    # ----------------------------------------
    build:
      context: .                    # Thư mục gốc (nơi chứa docker-compose.yml)
      dockerfile: Dockerfile.api    # Sử dụng Dockerfile.api để build

    # ----------------------------------------
    # Container name: Tên dễ nhớ
    # ----------------------------------------
    container_name: pill-recognition-api

    # ----------------------------------------
    # Ports: Mapping port container -> port host
    # ----------------------------------------
    # Format: "host_port:container_port"
    # 8000:8000 = Truy cập localhost:8000 -> container:8000
    ports:
      - "8000:8000"

    # ----------------------------------------
    # Environment: Biến môi trường
    # ----------------------------------------
    # Đây là cấu hình cho ứng dụng chạy trong container
    env_file:
      - ./myenv/.env
    environment:
      - BACKEND_HOST=0.0.0.0                                # Host (0.0.0.0 = lắng nghe mọi IP)
      - BACKEND_PORT=8000                                   # Port
      - ML_CLASSIFIER_MODEL_PATH=models/ml_classifier.pkl  # Đường dẫn model
      - MAX_FILE_SIZE_MB=5                                  # Kích thước file tối đa
      - LOG_LEVEL=INFO                                      # Mức log
      - ENVIRONMENT=production                              # Môi trường (production/development)

    # ----------------------------------------
    # Volumes: Mount thư mục từ host vào container
    # ----------------------------------------
    # Format: "host_path:container_path"
    # ./myenv/models:/app/models = Thư mục models trên host -> /app/models trong container
    # Lý do: Model file lớn, không nên copy vào image
    volumes:
      - ./myenv/models:/app/models    # ML models
      - ./myenv/logs:/app/logs        # Logs

    # ----------------------------------------
    # Network: Kết nối mạng
    # ----------------------------------------
    # Tất cả services trong cùng network có thể giao tiếp với nhau
    # api có thể gọi ui bằng tên service: http://ui:8501
    networks:
      - pill-network

    # ----------------------------------------
    # Restart policy: Khi nào restart container
    # ----------------------------------------
    # unless-stopped: Restart trừ khi bị dừng thủ công
    # (Khi reboot máy, container sẽ tự start lại)
    restart: unless-stopped

    # ----------------------------------------
    # Health check: Kiểm tra container có khỏe không
    # ----------------------------------------
    # Docker sẽ gọi http://localhost:8000/health mỗi 30 giây
    # Nếu fail 3 lần -> container bị restart
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health', timeout=5)"]
      interval: 30s      # Kiểm tra mỗi 30 giây
      timeout: 10s       # Chờ tối đa 10 giây
      retries: 3         # Thử lại 3 lần
      start_period: 40s  # Chờ 40 giây trước khi bắt đầu kiểm tra

  # ========================================
  # SERVICE 2: UI (Streamlit Frontend)
  # ========================================
  # Nhiệm vụ: Giao diện web cho người dùng
  # Công nghệ: Streamlit
  ui:
    # ----------------------------------------
    # Build: Hướng dẫn Docker build image
    # ----------------------------------------
    build:
      context: .                    # Thư mục gốc
      dockerfile: Dockerfile.ui     # Sử dụng Dockerfile.ui để build

    # ----------------------------------------
    # Container name: Tên dễ nhớ
    # ----------------------------------------
    container_name: pill-recognition-ui

    # ----------------------------------------
    # Ports: Mapping port container -> port host
    # ----------------------------------------
    # 8501:8501 = Truy cập localhost:8501 -> container:8501
    ports:
      - "8501:8501"

    # ----------------------------------------
    # Environment: Biến môi trường
    # ----------------------------------------
    env_file:
      - ./myenv/.env
    environment:
      - BACKEND_URL=http://api:8000                          # URL của API (dùng tên service)
      - FRONTEND_PORT=8501                                   # Port
      - MAX_FILE_SIZE_MB=5                                   # Kích thước file tối đa
      - LOG_LEVEL=INFO                                       # Mức log
      - ENVIRONMENT=production                               # Môi trường

    # ----------------------------------------
    # Volumes: Mount thư mục từ host vào container
    # ----------------------------------------
    volumes:
      - ./data:/app/data              # Dataset ảnh
      - ./myenv/models:/app/models    # ML models
      - ./myenv/logs:/app/logs        # Logs

    # ----------------------------------------
    # Network: Kết nối mạng
    # ----------------------------------------
    networks:
      - pill-network

    # ----------------------------------------
    # Depends on: Phụ thuộc service khác
    # ----------------------------------------
    # UI phụ thuộc API, phải đợi API healthy rồi mới start
    # Điều này đảm bảo khi UI start, API đã sẵn sàng nhận request
    depends_on:
      api:
        condition: service_healthy

    # ----------------------------------------
    # Restart policy: Khi nào restart container
    # ----------------------------------------
    restart: unless-stopped

    # ----------------------------------------
    # Health check: Kiểm tra container có khỏe không
    # ----------------------------------------
    # Docker sẽ gọi http://localhost:8501/_stcore/health mỗi 30 giây
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ========================================
# PHẦN 2: ĐỊNH NGHĨA NETWORK
# ========================================
# Network giúp các containers giao tiếp với nhau
# Tất cả services trong cùng network có thể gọi nhau bằng tên service

networks:
  pill-network:
    driver: bridge  # Sử dụng bridge network (mặc định)

# ========================================
# PHẦN 3: ĐỊNH NGHĨA VOLUMES (TÙY CHỌN)
# ========================================
# Volumes giúp lưu dữ liệu(không mất khi container restart)
# Tuy nhiên, trong file này chúng ta dùng bind mount (./myenv/models)
# nên không cần định nghĩa volumes ở đây

# volumes:
#   api-models:
#   api-logs:
#   ui-data:
#   ui-logs: